name: Build and Push Conversion Service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy (e.g. 1.3.0)'
        required: true

env:
  ECR_REPO_URL: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/conversion-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push conversion-service
        run: |
          docker build --no-cache \
            -t ${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            ./services/conversion-service
          docker push \
            ${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }}

      - name: Deploy to primary cluster
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster
          kubectl set image deployment/conversion-service-deployment \
            conversion-service=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling
          kubectl set image deployment/conversion-outbox-poller \
            conversion-outbox-poller=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling
          kubectl set image deployment/conversion-dynamo-cleaner \
            conversion-dynamo-cleaner=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling

      - name: Deploy to DR cluster
        run: |
          aws eks update-kubeconfig --region ap-southeast-1 --name wiseling-eks-cluster-sgp
          kubectl set image deployment/conversion-service-deployment \
            conversion-service=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling
          kubectl set image deployment/conversion-outbox-poller \
            conversion-outbox-poller=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling
          kubectl set image deployment/conversion-dynamo-cleaner \
            conversion-dynamo-cleaner=${{ env.ECR_REPO_URL }}:${{ github.event.inputs.image_tag }} \
            -n wiseling
