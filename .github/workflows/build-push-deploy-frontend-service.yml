name: Build and Push Frontend Service

on:
  workflow_dispatch:

env:
  ECR_REPO_URL: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/frontend
  IMAGE_TAG: 1.1.15

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names wiseling/frontend --region ap-southeast-2 || \
          aws ecr create-repository --repository-name wiseling/frontend --region ap-southeast-2

      - name: Build and push frontend
        run: |
          docker build \
            -t ${{ env.ECR_REPO_URL }}:${{ env.IMAGE_TAG }} \
            ./services/frontend-service

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster

      - name: Deploy frontend-service
        run: |
          docker push \
            ${{ env.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}
          kubectl apply -f kubernetes-manifests/deployments/green-deployments/frontend-service/