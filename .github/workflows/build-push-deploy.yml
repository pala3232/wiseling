name: Build, Push and Deploy Services

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and deploy'
        required: true
        type: choice
        options:
          - auth-service
          - wallet-service
          - conversion-service
          - withdrawal-service
          - frontend
      image_tag:
        description: 'Image tag (e.g. 1.3.0)'
        required: true

env:
  ECR_BASE: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          SERVICE=${{ github.event.inputs.service }}
          TAG=${{ github.event.inputs.image_tag }}
          ECR_REPO=${{ env.ECR_BASE }}/$SERVICE

          case $SERVICE in
            frontend) BUILD_PATH=./services/frontend-service ;;
            *)         BUILD_PATH=./services/$SERVICE ;;
          esac

          docker build -t $ECR_REPO:$TAG $BUILD_PATH
          docker push $ECR_REPO:$TAG

      - name: Deploy to primary cluster
        run: |
          SERVICE=${{ github.event.inputs.service }}
          TAG=${{ github.event.inputs.image_tag }}
          ECR_REPO=${{ env.ECR_BASE }}/$SERVICE
          NS=wiseling

          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster

          case $SERVICE in
            auth-service)
              kubectl set image deployment/auth-service-deployment auth-service=$ECR_REPO:$TAG -n $NS
              ;;
            wallet-service)
              kubectl set image deployment/wallet-service-deployment wallet-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/wallet-consumer wallet-consumer=$ECR_REPO:$TAG -n $NS
              ;;
            conversion-service)
              kubectl set image deployment/conversion-service-deployment conversion-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/conversion-outbox-poller conversion-outbox-poller=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/conversion-dynamo-cleaner conversion-dynamo-cleaner=$ECR_REPO:$TAG -n $NS
              ;;
            withdrawal-service)
              kubectl set image deployment/withdrawal-service-deployment withdrawal-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/withdrawal-processor withdrawal-processor=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/withdrawal-dynamo-cleaner withdrawal-dynamo-cleaner=$ECR_REPO:$TAG -n $NS
              ;;
            frontend)
              kubectl set image deployment/frontend-deployment frontend=$ECR_REPO:$TAG -n $NS
              ;;
          esac

      - name: Deploy to DR cluster
        run: |
          SERVICE=${{ github.event.inputs.service }}
          TAG=${{ github.event.inputs.image_tag }}
          ECR_REPO=${{ env.ECR_BASE }}/$SERVICE
          NS=wiseling

          aws eks update-kubeconfig --region ap-southeast-1 --name wiseling-eks-cluster-sgp

          case $SERVICE in
            auth-service)
              kubectl set image deployment/auth-service-deployment auth-service=$ECR_REPO:$TAG -n $NS
              ;;
            wallet-service)
              kubectl set image deployment/wallet-service-deployment wallet-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/wallet-consumer wallet-consumer=$ECR_REPO:$TAG -n $NS
              ;;
            conversion-service)
              kubectl set image deployment/conversion-service-deployment conversion-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/conversion-outbox-poller conversion-outbox-poller=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/conversion-dynamo-cleaner conversion-dynamo-cleaner=$ECR_REPO:$TAG -n $NS
              ;;
            withdrawal-service)
              kubectl set image deployment/withdrawal-service-deployment withdrawal-service=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/withdrawal-processor withdrawal-processor=$ECR_REPO:$TAG -n $NS
              kubectl set image deployment/withdrawal-dynamo-cleaner withdrawal-dynamo-cleaner=$ECR_REPO:$TAG -n $NS
              ;;
            frontend)
              kubectl set image deployment/frontend-deployment frontend=$ECR_REPO:$TAG -n $NS
              ;;
          esac
