name: 03 | Deploy Kubernetes Cluster

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Cluster to deploy'
        required: true
        type: choice
        options:
          - primary
          - dr

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.cluster == 'primary' && 'ap-southeast-2' || 'ap-southeast-1' }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Run deploy script
        run: |
          if [ "${{ github.event.inputs.cluster }}" = "primary" ]; then
            chmod +x scripts/deploy/deploy.sh
            ./scripts/deploy/deploy.sh
          else
            chmod +x scripts/deploy/deploy-dr.sh
            ./scripts/deploy/deploy-dr.sh
          fi
