name: Deploy Terraform Infrastructure (DR - Singapore)

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to target (01-network-sgp, 02-data-sgp, 03-iam-sgp, 04-eks-sgp, 05-global, or leave blank for all DR layers)'
        required: false
        default: ''
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Primary ALB already exists before this workflow runs — fetch it upfront
      - name: Get primary ALB DNS
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2
          PRIMARY_ALB=$(kubectl get ingress wiseling-ingress -n wiseling \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "TF_VAR_primary_alb_dns=$PRIMARY_ALB" >> $GITHUB_ENV
          echo "Primary ALB: $PRIMARY_ALB"

          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1 2>/dev/null || true
          DR_ALB=$(kubectl get ingress wiseling-ingress -n wiseling \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          echo "TF_VAR_dr_alb_dns=$DR_ALB" >> $GITHUB_ENV
          echo "DR ALB: $DR_ALB"

      - name: Run Terraform
        env:
          TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
        run: |
          LAYERS=("01-network-sgp" "02-data-sgp" "04-eks-sgp" "03-iam-sgp")
          TARGET="${{ github.event.inputs.layer }}"
          ACTION="${{ github.event.inputs.action }}"

          if [ "$TARGET" = "05-global" ]; then
            echo "05-global handled by dedicated step."
            exit 0
          fi

          run_layer() {
            local layer="$1"
            echo "══ Layer: $layer ══"
            cd "$GITHUB_WORKSPACE/terraform/layers-dr/$layer"
            terraform init -reconfigure

            if [ "$ACTION" = "plan" ]; then
              terraform plan
            else
              terraform apply -auto-approve
            fi
            cd "$GITHUB_WORKSPACE"
          }

          if [ -n "$TARGET" ]; then
            run_layer "$TARGET"
          else
            for layer in "${LAYERS[@]}"; do
              run_layer "$layer"
            done
          fi

      # DR ALB only exists after DR ingress is deployed — fetch it right before 05-global
      - name: Get DR ALB DNS
        if: ${{ github.event.inputs.layer == '05-global' }}
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1
          DR_ALB=$(kubectl get ingress wiseling-ingress -n wiseling \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "TF_VAR_dr_alb_dns=$DR_ALB" >> $GITHUB_ENV
          echo "DR ALB: $DR_ALB"

      - name: Apply 05-global
        if: ${{ github.event.inputs.layer == '05-global' && github.event.inputs.action == 'apply' }}
        env:
          TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
        run: |
          cd "$GITHUB_WORKSPACE/terraform/layers-dr/05-global"
          terraform init -reconfigure
          terraform apply -auto-approve
          echo "══ Route 53 nameservers (paste into Cloudflare) ══"
          terraform output name_servers