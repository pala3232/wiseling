name: Deploy Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to target (01-network, 02-data, 03-iam, 04-eks, or leave blank for all)'
        required: false
        default: ''
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run Terraform
        env:
          TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          LAYERS=("01-network" "02-data" "04-eks" "03-iam")
          TARGET="${{ github.event.inputs.layer }}"
          ACTION="${{ github.event.inputs.action }}"

          run_layer() {
            local layer="$1"
            echo "══ Layer: $layer ══"
            cd "$GITHUB_WORKSPACE/terraform/layers/$layer"
            terraform init -reconfigure

            if [ "$layer" = "02-data" ] && [ "$ACTION" = "apply" ]; then
              for repo in auth-service wallet-service conversion-service withdrawal-service frontend; do
                terraform import "aws_ecr_repository.services[\"$repo\"]" "wiseling/$repo" 2>/dev/null || true
              done
            fi

            if [ "$ACTION" = "plan" ]; then
              terraform plan
            else
              terraform apply -auto-approve
            fi
            cd "$GITHUB_WORKSPACE"
          }