name: Deploy Withdrawal Processor

on:
  workflow_dispatch:

env:
  ECR_REPO_URL: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/withdrawal-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster

      - name: Deploy withdrawal-processor
        run: |
          kubectl apply -f kubernetes-manifests/deployments/green-deployments/workers/withdrawal-processor.yaml
