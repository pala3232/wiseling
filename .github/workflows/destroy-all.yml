name: Destroy All Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm — this tears down BOTH clusters'
        required: true
        default: ''

env:
  TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
  TF_VAR_db_password:   ${{ secrets.DB_PASSWORD }}
  TF_VAR_domain_name:   ${{ secrets.DOMAIN_NAME }}

jobs:

  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destroy
        if: github.event.inputs.confirm_destroy != 'DESTROY'
        run: |
          echo "You must type DESTROY to proceed."
          exit 1

  # ── Pre-cleanup: drain nodes + delete ALBs + clear orphaned ENIs ─────────────
  # Runs for both regions in parallel. Must complete before Terraform destroy
  # or the subnet/SG deletes will fail with AuthFailure on RDS/ALB ENIs.

  pre-cleanup-primary:
    needs: confirm
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-2

      - name: Delete ingresses and wait for ALB removal
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2
          kubectl delete ingress -n wiseling --all --ignore-not-found
          kubectl delete ingress -n monitoring --all --ignore-not-found
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region ap-southeast-2 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `k8s-wiseling`)]' \
              --output text | wc -l)
            [ "$COUNT" -eq 0 ] && echo "ALB deleted." && break
            echo "Waiting for ALB... ($i/24)"; sleep 10
          done

      - name: Terminate all EKS nodes
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2
          kubectl delete namespace karpenter --ignore-not-found || true
          kubectl delete nodepool default --ignore-not-found || true
          aws eks update-nodegroup-config \
            --cluster-name wiseling-eks-cluster \
            --nodegroup-name bootstrap \
            --scaling-config minSize=0,maxSize=1,desiredSize=0 \
            --region ap-southeast-2 || true
          sleep 30
          INSTANCE_IDS=$(aws ec2 describe-instances --region ap-southeast-2 \
            --filters Name=tag:aws:eks:cluster-name,Values=wiseling-eks-cluster \
                      Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            aws ec2 terminate-instances --region ap-southeast-2 --instance-ids $INSTANCE_IDS
            aws ec2 wait instance-terminated --region ap-southeast-2 --instance-ids $INSTANCE_IDS
          fi

      - name: Cleanup orphaned ENIs and security groups
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-2 \
            --filters Name=tag:Name,Values=wiseling-vpc \
            --query 'Vpcs[0].VpcId' --output text)
          [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ] && exit 0

          for attempt in 1 2; do
            ENI_IDS=$(aws ec2 describe-network-interfaces --region ap-southeast-2 \
              --filters Name=vpc-id,Values=$VPC_ID \
              --query 'NetworkInterfaces[?Status!=`in-use`].NetworkInterfaceId' --output text)
            for ENI_ID in $ENI_IDS; do
              aws ec2 delete-network-interface --region ap-southeast-2 --network-interface-id $ENI_ID || true
            done
            [ "$attempt" -eq 1 ] && sleep 30
          done

          SG_IDS=$(aws ec2 describe-security-groups --region ap-southeast-2 \
            --filters Name=vpc-id,Values=$VPC_ID \
                      Name=tag:elbv2.k8s.aws/cluster,Values=wiseling-eks-cluster \
            --query 'SecurityGroups[*].GroupId' --output text)
          for SG_ID in $SG_IDS; do
            aws ec2 delete-security-group --region ap-southeast-2 --group-id $SG_ID || true
          done

  pre-cleanup-dr:
    needs: confirm
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1

      - name: Delete ingresses and wait for ALB removal
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1
          kubectl delete ingress -n wiseling --all --ignore-not-found
          kubectl delete ingress -n monitoring --all --ignore-not-found
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region ap-southeast-1 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `k8s-wiseling`)]' \
              --output text | wc -l)
            [ "$COUNT" -eq 0 ] && echo "ALB deleted." && break
            echo "Waiting for ALB... ($i/24)"; sleep 10
          done

      - name: Terminate all EKS nodes
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1
          kubectl delete namespace karpenter --ignore-not-found || true
          kubectl delete nodepool default --ignore-not-found || true
          aws eks update-nodegroup-config \
            --cluster-name wiseling-eks-cluster-sgp \
            --nodegroup-name bootstrap \
            --scaling-config minSize=0,maxSize=1,desiredSize=0 \
            --region ap-southeast-1 || true
          sleep 30
          INSTANCE_IDS=$(aws ec2 describe-instances --region ap-southeast-1 \
            --filters Name=tag:aws:eks:cluster-name,Values=wiseling-eks-cluster-sgp \
                      Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            aws ec2 terminate-instances --region ap-southeast-1 --instance-ids $INSTANCE_IDS
            aws ec2 wait instance-terminated --region ap-southeast-1 --instance-ids $INSTANCE_IDS
          fi

      - name: Cleanup orphaned ENIs, NAT Gateways and security groups
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-1 \
            --filters Name=tag:Name,Values=wiseling-vpc-sgp \
            --query 'Vpcs[0].VpcId' --output text)
          [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ] && exit 0

          for attempt in 1 2; do
            ENI_IDS=$(aws ec2 describe-network-interfaces --region ap-southeast-1 \
              --filters Name=vpc-id,Values=$VPC_ID \
              --query 'NetworkInterfaces[?Status!=`in-use`].NetworkInterfaceId' --output text)
            for ENI_ID in $ENI_IDS; do
              aws ec2 delete-network-interface --region ap-southeast-1 --network-interface-id $ENI_ID || true
            done
            [ "$attempt" -eq 1 ] && sleep 30
          done

          NAT_GW_IDS=$(aws ec2 describe-nat-gateways --region ap-southeast-1 \
            --filter Name=vpc-id,Values=$VPC_ID \
            --query 'NatGateways[].NatGatewayId' --output text)
          for NAT_GW_ID in $NAT_GW_IDS; do
            aws ec2 delete-nat-gateway --region ap-southeast-1 --nat-gateway-id $NAT_GW_ID || true
          done
          for NAT_GW_ID in $NAT_GW_IDS; do
            for i in $(seq 1 24); do
              STATE=$(aws ec2 describe-nat-gateways --region ap-southeast-1 \
                --nat-gateway-ids $NAT_GW_ID \
                --query 'NatGateways[0].State' --output text 2>/dev/null || echo "deleted")
              [ "$STATE" = "deleted" ] && break
              echo "Waiting for NAT GW... ($i/24)"; sleep 10
            done
          done

          SG_IDS=$(aws ec2 describe-security-groups --region ap-southeast-1 \
            --filters Name=vpc-id,Values=$VPC_ID \
                      Name=tag:elbv2.k8s.aws/cluster,Values=wiseling-eks-cluster-sgp \
            --query 'SecurityGroups[*].GroupId' --output text)
          for SG_ID in $SG_IDS; do
            aws ec2 delete-security-group --region ap-southeast-1 --group-id $SG_ID || true
          done

  # ── Terraform destroy: IAM → EKS → data → network (both regions parallel) ───

  destroy-primary:
    needs: pre-cleanup-primary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
      - name: Destroy primary layers in reverse order
        run: |
          run_destroy() {
            echo "══ Destroying envs/primary/$1 ══"
            cd "$GITHUB_WORKSPACE/terraform/envs/primary/$1"
            terraform init -reconfigure
            terraform destroy -auto-approve
            cd "$GITHUB_WORKSPACE"
          }

          run_destroy "04-iam"
          run_destroy "03-eks"

          run_destroy "02-data"

          run_destroy "01-network"

  destroy-dr:
    needs: pre-cleanup-dr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1
      - uses: hashicorp/setup-terraform@v3
      - name: Destroy DR layers in reverse order
        run: |
          run_destroy() {
            echo "══ Destroying envs/dr/$1 ══"
            cd "$GITHUB_WORKSPACE/terraform/envs/dr/$1"
            terraform init -reconfigure
            terraform destroy -auto-approve
            cd "$GITHUB_WORKSPACE"
          }

          run_destroy "04-iam"
          run_destroy "03-eks"
          run_destroy "02-data"
          run_destroy "01-network"

  # ── Global last — Route53 + ACM must outlive both clusters ───────────────────

  destroy-global:
    needs: [destroy-primary, destroy-dr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: Destroy global (Route53 + ACM)
        run: |
          cd terraform/envs/global
          terraform init -reconfigure
          terraform destroy -auto-approve
