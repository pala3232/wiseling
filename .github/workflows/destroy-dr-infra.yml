name: Destroy Terraform DR Infrastructure

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to destroy (01-network-sgp, 02-data-sgp, 03-iam-sgp, 04-eks-sgp, 05-global, or leave blank for all)'
        required: false
        default: ''
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true
        default: ''

jobs:
  pre-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Confirm destroy
        if: ${{ github.event.inputs.confirm_destroy != 'DESTROY' }}
        run: |
          echo "You must type DESTROY in the confirm_destroy field to proceed."
          exit 1

      - name: Delete ingresses and wait for ALB removal
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1
          kubectl delete ingress -n wiseling --all --ignore-not-found
          kubectl delete ingress -n monitoring --all --ignore-not-found

          echo "Waiting for ALB to be deleted..."
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region ap-southeast-1 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `k8s-wiseling`)]' \
              --output text | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "ALB deleted."
              break
            fi
            echo "Still waiting... ($i/24)"
            sleep 10
          done

      - name: Force delete any remaining ALBs
        continue-on-error: true
        run: |
            echo "Checking for leftover ALBs..."
            ALB_ARN_LIST=$(aws elbv2 describe-load-balancers --region ap-southeast-1 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `k8s-wiseling`)].LoadBalancerArn' \
              --output text)
            for ALB_ARN in $ALB_ARN_LIST; do
              echo "Deleting ALB $ALB_ARN"
              aws elbv2 delete-load-balancer --region ap-southeast-1 --load-balancer-arn $ALB_ARN || true
            done
            # Wait for deletion to complete
            for ALB_ARN in $ALB_ARN_LIST; do
              echo "Waiting for ALB $ALB_ARN to be deleted..."
              for i in $(seq 1 24); do
                STATUS=$(aws elbv2 describe-load-balancers --region ap-southeast-1 --load-balancer-arns $ALB_ARN --query 'LoadBalancers[0].State.Code' --output text 2>/dev/null || echo "deleted")
                if [ "$STATUS" = "deleted" ] || [ "$STATUS" = "not-found" ]; then
                  echo "ALB $ALB_ARN deleted."
                  break
                fi
                echo "Still waiting... ($i/24)"
                sleep 10
              done
            done

      - name: Terminate all EKS nodes
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster-sgp --region ap-southeast-1

          kubectl delete namespace karpenter --ignore-not-found || true
          kubectl delete nodepool default --ignore-not-found || true

          aws eks update-nodegroup-config \
            --cluster-name wiseling-eks-cluster-sgp \
            --nodegroup-name bootstrap \
            --scaling-config minSize=0,maxSize=1,desiredSize=0 \
            --region ap-southeast-1 || true

          sleep 30

          INSTANCE_IDS=$(aws ec2 describe-instances --region ap-southeast-1 \
            --filters \
              Name=tag:aws:eks:cluster-name,Values=wiseling-eks-cluster-sgp \
              Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          BOOTSTRAP_IDS=$(aws ec2 describe-instances --region ap-southeast-1 \
            --filters \
              Name=tag:eks:cluster-name,Values=wiseling-eks-cluster-sgp \
              Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          INSTANCE_IDS=$(echo "$INSTANCE_IDS $BOOTSTRAP_IDS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Terminating nodes: $INSTANCE_IDS"
            aws ec2 terminate-instances --region ap-southeast-1 --instance-ids $INSTANCE_IDS
            aws ec2 wait instance-terminated --region ap-southeast-1 --instance-ids $INSTANCE_IDS
            echo "All nodes terminated."
          else
            echo "No nodes found."
          fi

      - name: Cleanup orphaned ENIs
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-1 \
            --filters Name=tag:Name,Values=wiseling-vpc-sgp \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC not found, skipping."
            exit 0
          fi

          echo "Cleaning up ENIs in VPC $VPC_ID..."
          ENI_IDS=$(aws ec2 describe-network-interfaces --region ap-southeast-1 \
            --filters Name=vpc-id,Values=$VPC_ID \
            --query 'NetworkInterfaces[?Status!=`in-use`].NetworkInterfaceId' \
            --output text)

          for ENI_ID in $ENI_IDS; do
            echo "Deleting ENI $ENI_ID"
            aws ec2 delete-network-interface --region ap-southeast-1 \
              --network-interface-id $ENI_ID || true
          done

          echo "Waiting for any in-use ENIs to detach..."
          sleep 30

          # Second pass - catch anything that just detached
          ENI_IDS=$(aws ec2 describe-network-interfaces --region ap-southeast-1 \
            --filters Name=vpc-id,Values=$VPC_ID \
            --query 'NetworkInterfaces[?Status!=`in-use`].NetworkInterfaceId' \
            --output text)

          for ENI_ID in $ENI_IDS; do
            echo "Deleting ENI $ENI_ID"
            aws ec2 delete-network-interface --region ap-southeast-1 \
              --network-interface-id $ENI_ID || true
          done
      - name: Cleanup NAT Gateways
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-1 \
            --filters Name=tag:Name,Values=wiseling-vpc-sgp \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC not found, skipping NAT Gateway cleanup."
            exit 0
          fi

          echo "Listing NAT Gateways in VPC $VPC_ID..."
          NAT_GW_IDS=$(aws ec2 describe-nat-gateways --region ap-southeast-1 \
            --filter Name=vpc-id,Values=$VPC_ID \
            --query 'NatGateways[].NatGatewayId' --output text)

          for NAT_GW_ID in $NAT_GW_IDS; do
            echo "Deleting NAT Gateway $NAT_GW_ID"
            aws ec2 delete-nat-gateway --region ap-southeast-1 --nat-gateway-id $NAT_GW_ID || true
          done

          # Wait for NAT Gateways to be deleted
          for NAT_GW_ID in $NAT_GW_IDS; do
            for i in $(seq 1 24); do
              STATE=$(aws ec2 describe-nat-gateways --region ap-southeast-1 \
                --nat-gateway-ids $NAT_GW_ID \
                --query 'NatGateways[0].State' --output text 2>/dev/null || echo "deleted")
              if [ "$STATE" = "deleted" ] || [ "$STATE" = "not-found" ]; then
                echo "NAT Gateway $NAT_GW_ID deleted."
                break
              fi
              echo "Still waiting for NAT Gateway $NAT_GW_ID to be deleted... ($i/24)"
              sleep 10
            done
          done
      - name: Cleanup LB controller security groups
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-1 \
            --filters Name=tag:Name,Values=wiseling-vpc \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            SG_IDS=$(aws ec2 describe-security-groups --region ap-southeast-1 \
              --filters Name=vpc-id,Values=$VPC_ID \
                        Name=tag:elbv2.k8s.aws/cluster,Values=wiseling-eks-cluster-sgp \
              --query 'SecurityGroups[*].GroupId' --output text)

            for SG_ID in $SG_IDS; do
              REFS=$(aws ec2 describe-security-groups --region ap-southeast-1 \
                --filters Name=ip-permission.group-id,Values=$SG_ID \
                --query 'SecurityGroups[*].GroupId' --output text)
              for REF_SG in $REFS; do
                RULE_IDS=$(aws ec2 describe-security-group-rules --region ap-southeast-1 \
                  --filters Name=group-id,Values=$REF_SG \
                  --query "SecurityGroupRules[?ReferencedGroupInfo.GroupId==\`$SG_ID\`].SecurityGroupRuleId" \
                  --output text)
                if [ -n "$RULE_IDS" ] && [ "$RULE_IDS" != "None" ]; then
                  aws ec2 revoke-security-group-ingress --region ap-southeast-1 \
                    --group-id $REF_SG --security-group-rule-ids $RULE_IDS || true
                fi
              done
              echo "Deleting SG $SG_ID"
              aws ec2 delete-security-group --region ap-southeast-1 --group-id $SG_ID || true
            done
          fi

  terraform-destroy:
    needs: pre-cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        env:
          TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          DR_LAYERS=("03-iam-sgp" "04-eks-sgp" "02-data-sgp" "01-network-sgp")
          TARGET="${{ github.event.inputs.layer }}"

          destroy_dr_layer() {
            local layer="$1"
            echo "══ Destroying layer: $layer ══"
            cd "$GITHUB_WORKSPACE/terraform/layers-dr/$layer"
            terraform init -reconfigure
            terraform destroy -auto-approve
            cd "$GITHUB_WORKSPACE"
          }

          destroy_global_layer() {
            echo "══ Destroying layer: 05-global ══"
            cd "$GITHUB_WORKSPACE/terraform/layers-dr/05-global"
            terraform init -reconfigure
            terraform destroy -auto-approve
            cd "$GITHUB_WORKSPACE"
          }

          if [ -n "$TARGET" ]; then
            if [ "$TARGET" = "05-global" ]; then
              destroy_global_layer
            else
              destroy_dr_layer "$TARGET"
            fi
          else
            for layer in "${DR_LAYERS[@]}"; do
              destroy_dr_layer "$layer"
            done
            destroy_global_layer
          fi

  post-cleanup:
    needs: terraform-destroy
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Cleanup leftover EKS cluster security group
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-1 \
            --filters Name=tag:Name,Values=wiseling-vpc \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            SG_ID=$(aws ec2 describe-security-groups --region ap-southeast-1 \
              --filters Name=vpc-id,Values=$VPC_ID \
                        Name=group-name,Values=eks-cluster-sg-wiseling-eks-cluster-* \
              --query 'SecurityGroups[0].GroupId' --output text)

            if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
              echo "Deleting leftover EKS cluster SG $SG_ID"
              aws ec2 delete-security-group --region ap-southeast-1 --group-id $SG_ID || true
            fi
          fi