name: Destroy Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to destroy (01-network, 02-data, 03-iam, 04-eks, or leave blank for all)'
        required: false
        default: ''
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true
        default: ''

jobs:
  pre-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Confirm destroy
        if: ${{ github.event.inputs.confirm_destroy != 'DESTROY' }}
        run: |
          echo "You must type DESTROY in the confirm_destroy field to proceed."
          exit 1

      - name: Delete ingresses and wait for ALB removal
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2
          kubectl delete ingress -n wiseling --all --ignore-not-found
          kubectl delete ingress -n monitoring --all --ignore-not-found

          echo "Waiting for ALB to be deleted..."
          for i in $(seq 1 24); do
            COUNT=$(aws elbv2 describe-load-balancers --region ap-southeast-2 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `k8s-wiseling`)]' \
              --output text | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "ALB deleted."
              break
            fi
            echo "Still waiting... ($i/24)"
            sleep 10
          done

      - name: Terminate all EKS nodes
        continue-on-error: true
        run: |
          aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2

          kubectl delete namespace karpenter --ignore-not-found || true
          kubectl delete nodepool default --ignore-not-found || true

          aws eks update-nodegroup-config \
            --cluster-name wiseling-eks-cluster \
            --nodegroup-name bootstrap \
            --scaling-config minSize=0,maxSize=1,desiredSize=0 \
            --region ap-southeast-2 || true

          sleep 30

          INSTANCE_IDS=$(aws ec2 describe-instances --region ap-southeast-2 \
                      --filters \
                        Name=tag:aws:eks:cluster-name,Values=wiseling-eks-cluster \
                        Name=instance-state-name,Values=running \
                      --query 'Reservations[].Instances[].InstanceId' \
                      --output text)
                      
          BOOTSTRAP_IDS=$(aws ec2 describe-instances --region ap-southeast-2 \
            --filters \
              Name=tag:eks:cluster-name,Values=wiseling-eks-cluster \
              Name=instance-state-name,Values=running \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          INSTANCE_IDS=$(echo "$INSTANCE_IDS $BOOTSTRAP_IDS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Terminating nodes: $INSTANCE_IDS"
            aws ec2 terminate-instances --region ap-southeast-2 --instance-ids $INSTANCE_IDS
            aws ec2 wait instance-terminated --region ap-southeast-2 --instance-ids $INSTANCE_IDS
            echo "All nodes terminated."
          else
            echo "No nodes found."
          fi

      - name: Cleanup LB controller security groups
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-2 \
            --filters Name=tag:Name,Values=wiseling-vpc \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            SG_IDS=$(aws ec2 describe-security-groups --region ap-southeast-2 \
              --filters Name=vpc-id,Values=$VPC_ID \
                        Name=tag:elbv2.k8s.aws/cluster,Values=wiseling-eks-cluster \
              --query 'SecurityGroups[*].GroupId' --output text)

            for SG_ID in $SG_IDS; do
              REFS=$(aws ec2 describe-security-groups --region ap-southeast-2 \
                --filters Name=ip-permission.group-id,Values=$SG_ID \
                --query 'SecurityGroups[*].GroupId' --output text)
              for REF_SG in $REFS; do
                RULE_IDS=$(aws ec2 describe-security-group-rules --region ap-southeast-2 \
                  --filters Name=group-id,Values=$REF_SG \
                  --query "SecurityGroupRules[?ReferencedGroupInfo.GroupId==\`$SG_ID\`].SecurityGroupRuleId" \
                  --output text)
                if [ -n "$RULE_IDS" ] && [ "$RULE_IDS" != "None" ]; then
                  aws ec2 revoke-security-group-ingress --region ap-southeast-2 \
                    --group-id $REF_SG --security-group-rule-ids $RULE_IDS || true
                fi
              done
              echo "Deleting SG $SG_ID"
              aws ec2 delete-security-group --region ap-southeast-2 --group-id $SG_ID || true
            done
          fi

  terraform-destroy:
    needs: pre-cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        env:
          TF_VAR_admin_iam_arn: ${{ secrets.ADMIN_IAM_ARN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          LAYERS=("03-iam" "04-eks" "02-data" "01-network")
          TARGET="${{ github.event.inputs.layer }}"

          destroy_layer() {
            local layer="$1"
            echo "══ Destroying layer: $layer ══"
            cd "$GITHUB_WORKSPACE/terraform/layers/$layer"
            terraform init -reconfigure

            if [ "$layer" = "02-data" ]; then
              for repo in auth-service wallet-service conversion-service withdrawal-service frontend; do
                terraform state rm "aws_ecr_repository.services[\"$repo\"]" || true
              done
            fi

            terraform destroy -auto-approve
            cd "$GITHUB_WORKSPACE"
          }

          if [ -n "$TARGET" ]; then
            destroy_layer "$TARGET"
          else
            for layer in "${LAYERS[@]}"; do
              destroy_layer "$layer"
            done
          fi

  post-cleanup:
    needs: terraform-destroy
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Cleanup leftover EKS cluster security group
        continue-on-error: true
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ap-southeast-2 \
            --filters Name=tag:Name,Values=wiseling-vpc \
            --query 'Vpcs[0].VpcId' --output text)

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            SG_ID=$(aws ec2 describe-security-groups --region ap-southeast-2 \
              --filters Name=vpc-id,Values=$VPC_ID \
                        Name=group-name,Values=eks-cluster-sg-wiseling-eks-cluster-* \
              --query 'SecurityGroups[0].GroupId' --output text)

            if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
              echo "Deleting leftover EKS cluster SG $SG_ID"
              aws ec2 delete-security-group --region ap-southeast-2 --group-id $SG_ID || true
            fi
          fi