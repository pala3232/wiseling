name: Destroy Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Terraform subdirectory (leave blank for all)'
        required: false
        default: ''
      confirm_destroy:
        description: 'Type DESTROY to confirm destruction'
        required: true
        default: ''

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set working directory
        id: setdir
        run: |
          if [ -n "${{ github.event.inputs.target_module }}" ]; then
            echo "::set-output name=dir::terraform/${{ github.event.inputs.target_module }}"
          else
            echo "::set-output name=dir::terraform"
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=${{ steps.setdir.outputs.dir }} init
      - name: Confirm destroy
        if: ${{ github.event.inputs.confirm_destroy != 'DESTROY' }}
        run: |
          echo "You must type DESTROY in the confirm_destroy field to proceed."
          exit 1
      - name: Terraform Destroy
        if: ${{ github.event.inputs.confirm_destroy == 'DESTROY' }}
        run: terraform -chdir=${{ steps.setdir.outputs.dir }} destroy -auto-approve
