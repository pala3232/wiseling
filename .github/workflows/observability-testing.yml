name: 07 | Load Tests


on:
  workflow_dispatch:

jobs:
  deploy-observability:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
          

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: configure kubectl
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster

      - name: Make scripts executable
        run: |
          chmod +x scripts/observability/run-experiments.sh

      - name: Run Tests
        run: ./scripts/observability/run-experiments.sh
