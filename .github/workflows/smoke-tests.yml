name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'ALB base URL (leave blank to fetch from cluster)'
        required: false
        default: ''

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name wiseling-eks-cluster --region ap-southeast-2

      - name: Resolve BASE_URL
        id: resolve_url
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "base_url=${{ github.event.inputs.base_url }}" >> $GITHUB_OUTPUT
          else
            ALB=$(kubectl get ingress wiseling-ingress -n wiseling \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            echo "base_url=http://${ALB}" >> $GITHUB_OUTPUT
          fi

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests/main.sh
          ./scripts/smoke-tests/main.sh
        env:
          BASE_URL: ${{ steps.resolve_url.outputs.base_url }}