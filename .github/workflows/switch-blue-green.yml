name: Switch Blue/Green Deployment

on:
  workflow_dispatch:
    inputs:
      color:
        description: 'Deployment color (blue or green)'
        required: true
        default: 'green'

jobs:
  switch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster
      - name: Switch traffic to ${{ github.event.inputs.color }}
        run: |
          chmod +x ./scripts/deploy/switch-blue-green.sh
          ./scripts/deploy/switch-blue-green.sh ${{ github.event.inputs.color }}
