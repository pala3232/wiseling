name: Run Testing Experiments+Locust


on:
  workflow_dispatch:

jobs:
  deploy-observability:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
          

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: configure kubectl
        run: |
          aws eks update-kubeconfig --region ap-southeast-2 --name wiseling-eks-cluster

      - name: Make scripts executable
        run: |
          chmod +x scripts/observability/install-stack.sh
          chmod +x scripts/observability/run-experiments.sh

      - name: Update observability stack (applies latest alert rules and Alertmanager config)
        run: ./scripts/observability/install-stack.sh

      - name: Run Tests
        run: ./scripts/observability/run-experiments.sh
