apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: wiseling
  labels:
    app: auth-service
    deployment: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
      deployment: green
  template:
    metadata:
      labels:
        app: auth-service
        deployment: green
    spec:
      serviceAccountName: wiseling-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-service
      containers:
      - name: auth-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/auth-service:1.0.8
        ports:
        - containerPort: 8000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        - secretRef:
            name: db-url-auth
        resources:
          limits:
            memory: "256Mi"
            cpu: "300m"
          requests:
            memory: "128Mi"
            cpu: "100m"