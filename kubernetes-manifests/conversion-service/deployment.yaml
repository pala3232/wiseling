apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversion-service-deployment
  namespace: wiseling
  labels:
    app: conversion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conversion-service
  template:
    metadata:
      labels:
        app: conversion-service
    spec:
      serviceAccountName: wiseling-sa
      containers:
      - name: conversion-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/conversion-service:1.0.7
        ports:
        - containerPort: 8002
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-url-conversion
              key: DATABASE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "150m"