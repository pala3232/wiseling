apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: wiseling
  labels:
    app: auth-service
    deployment: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
      deployment: green
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
      labels:
        app: auth-service
        deployment: green
    spec:
      serviceAccountName: wiseling-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app:  auth-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: auth-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/auth-service:1.2.0
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 10
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        - secretRef:
            name: db-url-auth
        resources:
          limits:
            memory: "256Mi"
            cpu: "1000m"
          requests:
            memory: "128Mi"
            cpu: "100m"