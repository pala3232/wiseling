apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wiseling
  labels:
    app: frontend
    deployment: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      deployment: blue
  template:
    metadata:
      labels:
        app: frontend
        deployment: blue
    spec:
      serviceAccountName: wiseling-sa
      containers:
      - name: frontend
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/frontend:1.0.9
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
          requests:
            memory: "32Mi"
            cpu: "25m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: wiseling
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80