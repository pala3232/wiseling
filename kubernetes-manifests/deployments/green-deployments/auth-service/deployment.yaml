apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: wiseling
  labels:
    app: auth-service
    deployment: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
      deployment: green
  template:
    metadata:
      labels:
        app: auth-service
        deployment: green
    spec:
      serviceAccountName: wiseling-sa
      containers:
      - name: auth-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/auth-service:1.0.6
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-url-auth
              key: DATABASE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "150m"