apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wiseling
  labels:
    app: frontend
    deployment: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      deployment: green
  template:
    metadata:
      labels:
        app: frontend
        deployment: green
    spec:
      serviceAccountName: wiseling-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend
      containers:
      - name: frontend
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/frontend:1.1.8
        ports:
        - containerPort: 80
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: CLUSTER_NAME
          value: "wiseling-eks-cluster"
        - name: AWS_REGION
          value: "ap-southeast-2"
        - name: AWS_AZ
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['topology.kubernetes.io/zone']
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "32Mi"
            cpu: "25m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: wiseling
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80