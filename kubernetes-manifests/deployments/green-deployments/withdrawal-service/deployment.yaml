apiVersion: apps/v1
kind: Deployment
metadata:
  name: withdrawal-service-deployment
  namespace: wiseling
  labels:
    app: withdrawal-service
    deployment: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: withdrawal-service
      deployment: green
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
      labels:
        app: withdrawal-service
        deployment: green
    spec:
      serviceAccountName: wiseling-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: withdrawal-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: withdrawal-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: withdrawal-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/withdrawal-service:1.2.0
        command: ["sh", "-c", "sleep 5 && uvicorn app.main:app --host 0.0.0.0 --port 8003"]
        ports:
        - containerPort: 8003
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-url-withdrawal
              key: DATABASE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "300m"
          requests:
            memory: "128Mi"
            cpu: "100m"