# Experiment 2: Network delay on outbox pollers
#
# PURPOSE: Simulates a slow network between outbox pollers and SQS.
# The outbox pollers (conversion-outbox-poller, withdrawal-outbox-poller)
# poll RDS for PENDING events and publish to SQS. If publishing is slow,
# events back up in the RDS outbox table.
#
# EXPECTED BEHAVIOUR:
#   - Outbox PENDING rows accumulate in RDS
#   - SQS queue depth stays low (messages not arriving)
#   - wallet-consumer becomes idle
#   - Once delay lifts, pollers catch up and drain the backlog
#   - Alertmanager fires: OutboxPollerLag (if you have this rule)
#
# VALIDATES: Outbox pattern resilience, poller retry behaviour,
#            graceful degradation under network issues

apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: outbox-poller-network-delay
  namespace: wiseling
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - wiseling
    labelSelectors:
      component: outbox-poller
  delay:
    latency: "2000ms"
    correlation: "25"
    jitter: "500ms"
  direction: egress
  duration: "3m"
