# Deny all ingress and egress by default for all pods in wiseling namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: wiseling
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow egress to AWS services (RDS, SQS, DynamoDB, etc.) via NAT Gateway or VPC CIDR
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-aws
  namespace: wiseling
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 80
