spec:
  podSelector:
    matchLabels:
      app: withdrawal-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: wallet-service
        - podSelector:
            matchLabels:
              app: wallet-consumer
      ports:
        - protocol: TCP
          port: 8003
---
# Allow ingress to conversion-service from wallet-service
apiVersion: networking.k8s.io/v1
