# Allow ingress to auth-service only from wallet-service and withdrawal-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-ingress
  namespace: wiseling
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: wallet-service
        - podSelector:
            matchLabels:
              app: withdrawal-service
        - podSelector:
            matchLabels:
              app: wallet-consumer
        - podSelector:
            matchLabels:
              app: withdrawal-processor
        - podSelector:
            matchLabels:
              app: withdrawal-dynamo-cleaner
      ports:
        - protocol: TCP
          port: 8000
---
# Allow ingress to wallet-service from auth-service, withdrawal-service, conversion-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wallet-ingress
  namespace: wiseling
spec:
  podSelector:
    matchLabels:
      app: wallet-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: withdrawal-service
        - podSelector:
            matchLabels:
              app: conversion-service
        - podSelector:
            matchLabels:
              app: wallet-consumer
        - podSelector:
            matchLabels:
              app: conversion-dynamo-cleaner
        - podSelector:
            matchLabels:
              app: conversion-outbox-poller
      ports:
        - protocol: TCP
          port: 8001
---
# Allow ingress to withdrawal-service from wallet-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-withdrawal-ingress
