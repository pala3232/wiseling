apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-url-auth
  namespace: wiseling
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: db-url-auth
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: wiseling/db-urls
        property: auth