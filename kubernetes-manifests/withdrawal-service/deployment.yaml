apiVersion: apps/v1
kind: Deployment
metadata:
  name: withdrawal-service-deployment
  namespace: wiseling
  labels:
    app: withdrawal-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: withdrawal-service
  template:
    metadata:
      labels:
        app: withdrawal-service
    spec:
      serviceAccountName: wiseling-sa
      containers:
      - name: withdrawal-service
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/withdrawal-service:1.0.10
        command: ["sh", "-c", "sleep 5 && uvicorn app.main:app --host 0.0.0.0 --port 8003"]
        ports:
        - containerPort: 8003
        envFrom:
        - configMapRef:
            name: wiseling-config
        - secretRef:
            name: jwt-secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-url-withdrawal
              key: DATABASE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "150m"