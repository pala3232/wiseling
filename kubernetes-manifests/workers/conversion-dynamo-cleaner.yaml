apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversion-dynamo-cleaner
  namespace: wiseling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conversion-dynamo-cleaner
  template:
    metadata:
      labels:
        app: conversion-dynamo-cleaner
    spec:
      serviceAccountName: wiseling-sa
      containers:
      - name: conversion-dynamo-cleaner
        image: 359707702022.dkr.ecr.ap-southeast-2.amazonaws.com/wiseling/conversion-service:1.0.4
        command: ["python", "-m", "app.services.dynamo_cleaner"]
        envFrom:
          - configMapRef:
              name: wiseling-config
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: db-url-conversion
                key: DATABASE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"