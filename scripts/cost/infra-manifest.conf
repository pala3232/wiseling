# Wiseling infrastructure cost manifest
# Defines all known resources so cost-report.sh [5] can project costs without deploying anything.
# Update this file when infrastructure changes.
#
# Format (space-separated, # = comment):
#   type         count  spec          region          label
#
# Supported types: eks_cluster | ec2 | rds | nat_gateway | alb | route53_zone | route53_hc | secretsmanager_secret | cloudwatch_alarm | dynamodb_global_table
# spec: instance type for ec2 (e.g. t3.large), DB class for rds (e.g. db.t3.micro), use - for others
# Karpenter nodes are included below as a loaded estimate (1 node per region on top of the bootstrap node).
# Add separate ec2 rows with your expected Karpenter instance types if you want a loaded estimate.

# ── Primary region (ap-southeast-2) ───────────────────────────────────────────
eks_cluster   1  -             ap-southeast-2  EKS control plane (primary)
ec2           1  t3.large      ap-southeast-2  Bootstrap node (always-on)
rds           1  db.t3.micro   ap-southeast-2  RDS PostgreSQL 16 primary
nat_gateway   1  -             ap-southeast-2  NAT Gateway (primary VPC)
alb           1  -             ap-southeast-2  ALB ingress (primary cluster)

# ── DR region (ap-southeast-1) ────────────────────────────────────────────────
eks_cluster   1  -             ap-southeast-1  EKS control plane (DR)
ec2           1  t3.large      ap-southeast-1  Bootstrap node (always-on)
rds           1  db.t3.micro   ap-southeast-1  RDS read replica (DR failover)
nat_gateway   1  -             ap-southeast-1  NAT Gateway (DR VPC)
alb           1  -             ap-southeast-1  ALB ingress (DR cluster)

# ── Route 53 ($0.50/month flat per zone, region-agnostic) ────────────────────
# Elastic IPs on NAT Gateways are free while attached — no line needed.
route53_zone  1  -             us-east-1       Route 53 hosted zone
route53_hc    1  fast          us-east-1       R53 health check (primary, 10s)
route53_hc    1  standard      us-east-1       R53 health check (DR, 30s)

# ── Secrets Manager ───────────────────────────────────────────────────────────
secretsmanager_secret  2  -    ap-southeast-2  Secrets Manager (primary)
secretsmanager_secret  2  -    ap-southeast-1  Secrets Manager (DR)

# ── CloudWatch alarms ─────────────────────────────────────────────────────────
cloudwatch_alarm  1  -         us-east-1       CW alarm (R53 failover)
cloudwatch_alarm  2  -         ap-southeast-2  CW alarms (SQS DLQs)
cloudwatch_alarm  1  -         ap-southeast-1  CW alarm (RDS lag)

# ── DynamoDB ──────────────────────────────────────────────────────────────────
# PAY_PER_REQUEST + global table replica writes. Low traffic estimate ~$1/month.
dynamodb_global_table  1  -    ap-southeast-2  DynamoDB outbox (global, low est.)

# ── Karpenter nodes (loaded estimate) ────────────────────────────────────────
# 1 extra t3.large per region on top of the always-on bootstrap node above.
ec2           1  t3.large      ap-southeast-2  Karpenter node (primary)
ec2           1  t3.large      ap-southeast-1  Karpenter node (DR)
