# set slack_api_url to your actual Slack webhook URL in production,
      # message format and channels can be customized as needed.
alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'your-webhook-url'  # Replace with your actual Slack webhook URL

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 12h
      receiver: slack-alerts
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          continue: true
        - match:
            severity: warning
          receiver: slack-alerts

    receivers:
      - name: slack-alerts
        slack_configs:
          - channel: '#wiseling-eks-cluster-main'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ range .Alerts }}{{ .Labels.alertname }} {{ end }}'
            text: "{{ range .Alerts }}*Alert:* {{ .Annotations.summary }}\n*Namespace:* {{ .Labels.namespace }}\n*Severity:* {{ .Labels.severity }}\n*Description:* {{ .Annotations.description }}\n{{ end }}"

      - name: slack-critical
        slack_configs:
          - channel: '#wiseling-eks-cluster-main'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ range .Alerts }}{{ .Labels.alertname }} {{ end }}'
            text: "{{ range .Alerts }}*Alert:* {{ .Annotations.summary }}\n*Namespace:* {{ .Labels.namespace }}\n*Description:* {{ .Annotations.description }}\n{{ end }}"

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['namespace']

prometheus:
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: 'wiseling/auth-service'
        static_configs:
          - targets: ['auth-service.wiseling.svc.cluster.local:8000']
        metrics_path: '/metrics'

      - job_name: 'wiseling/wallet-service'
        static_configs:
          - targets: ['wallet-service.wiseling.svc.cluster.local:8001']
        metrics_path: '/metrics'

      - job_name: 'wiseling/conversion-service'
        static_configs:
          - targets: ['conversion-service.wiseling.svc.cluster.local:8002']
        metrics_path: '/metrics'

      - job_name: 'wiseling/withdrawal-service'
        static_configs:
          - targets: ['withdrawal-service.wiseling.svc.cluster.local:8003']
        metrics_path: '/metrics'

additionalPrometheusRulesMap:
  wiseling-alerts:
    groups:
      - name: wiseling.pods
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="wiseling"}[5m]) > 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 5 minutes."

          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{namespace="wiseling", condition="true"} == 0
              unless on(pod, namespace) kube_pod_status_phase{namespace="wiseling", phase="Succeeded"}
              unless on(pod, namespace) kube_pod_status_phase{namespace="wiseling", phase="Failed"}
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
              description: "Pod {{ $labels.pod }} in namespace wiseling has been not ready for more than 1 minute."

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas{namespace="wiseling"} != kube_deployment_status_available_replicas{namespace="wiseling"}
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.deployment }} has mismatched replicas"
              description: "Deployment {{ $labels.deployment }} expected {{ $value }} replicas but has fewer available."

      - name: wiseling.services
        rules:
          - alert: WalletServiceDown
            expr: up{job="wiseling/wallet-service"} == 0
            for: 1m
            labels:
              severity: critical
              namespace: wiseling
            annotations:
              summary: "Wallet service is down"
              description: "The wallet-service has been unreachable for more than 1 minute."

          - alert: AuthServiceDown
            expr: up{job="wiseling/auth-service"} == 0
            for: 1m
            labels:
              severity: critical
              namespace: wiseling
            annotations:
              summary: "Auth service is down"
              description: "The auth-service has been unreachable for more than 1 minute."

          - alert: WithdrawalServiceDown
            expr: up{job="wiseling/withdrawal-service"} == 0
            for: 1m
            labels:
              severity: critical
              namespace: wiseling
            annotations:
              summary: "Withdrawal service is down"
              description: "The withdrawal-service has been unreachable for more than 1 minute."

          - alert: ConversionServiceDown
            expr: up{job="wiseling/conversion-service"} == 0
            for: 1m
            labels:
              severity: critical
              namespace: wiseling
            annotations:
              summary: "Conversion service is down"
              description: "The conversion-service has been unreachable for more than 1 minute."

      - name: wiseling.resources
        rules:
          - alert: HighMemoryUsage
            expr: container_memory_usage_bytes{namespace="wiseling"} / container_spec_memory_limit_bytes{namespace="wiseling"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in {{ $labels.pod }}"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 85% of its memory limit."

          - alert: HighCPUUsage
            expr: rate(container_cpu_usage_seconds_total{namespace="wiseling"}[5m]) / container_spec_cpu_quota{namespace="wiseling"} * 100000 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage in {{ $labels.pod }}"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 80% CPU."

      - name: wiseling.slo
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{job=~"wiseling/.*", status="5xx"}[5m]))
              / sum(rate(http_requests_total{job=~"wiseling/.*"}[5m])) > 0.01
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on Wiseling services"
              description: "More than 1% of requests are returning 5xx errors."

          - alert: HighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"wiseling/.*"}[5m])) by (le, job)) > 2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High latency on {{ $labels.job }}"
              description: "95th percentile latency is above 2 seconds on {{ $labels.job }}."

          - alert: LowRequestRate
            expr: |
              sum(rate(http_requests_total{job=~"wiseling/.*"}[5m])) < 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Unusually low request rate"
              description: "Request rate has dropped below 0.1 req/s — services may be unreachable."

      - name: wiseling.security
        rules:
          - alert: UnauthorizedRequests
            expr: sum(rate(http_requests_total{job=~"wiseling/.*", status="4xx"}[5m])) > 10
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High rate of unauthorized requests"
              description: "More than 10 4xx/sec — possible brute force or token abuse."

          - alert: ForbiddenRequestSpike
            expr: sum(rate(http_requests_total{job=~"wiseling/.*", status="4xx"}[5m])) > 50
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Spike in forbidden requests"
              description: "Possible unauthorized access attempts on Wiseling."

      - name: wiseling.nodes
        rules:
          - alert: NodeHighCPU
            expr: 100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on node {{ $labels.node }}"
              description: "Node {{ $labels.node }} CPU usage is above 80% for 5 minutes."

          - alert: NodeHighMemory
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory on node {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} memory usage is above 85%."

          - alert: NodeDiskPressure
            expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk pressure on node {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} disk usage is above 80% on /."

          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready", status="true"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is not ready"
              description: "Node {{ $labels.node }} has been in NotReady state for more than 2 minutes."

grafana:
  enabled: true
  adminPassword: pala3105
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true