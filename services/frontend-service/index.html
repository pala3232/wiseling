<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Wiseling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=2">
</head>
<body>
  <div id="app"></div>

  <!-- ENV INFO: outside Vue, always fixed bottom-right -->
  <div class="env-info-footer" id="env-info-footer">
    <div class="env-info-row" id="env-info-row">
      <span class="env-info-item"><span class="env-info-label">Pod</span><span class="env-info-val" id="env-pod">—</span></span>
      <span class="env-info-sep">·</span>
      <span class="env-info-item"><span class="env-info-label">Node</span><span class="env-info-val" id="env-node">—</span></span>
      <span class="env-info-sep">·</span>
      <span class="env-info-item"><span class="env-info-label">Cluster</span><span class="env-info-val" id="env-cluster">—</span></span>
      <span class="env-info-sep">·</span>
      <span class="env-info-item"><span class="env-info-label">Region</span><span class="env-info-val" id="env-region">—</span></span>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="app.js"></script>
  <script>
    fetch('/api/v1/envinfo').then(r => r.ok ? r.json() : null).then(d => {
      if (!d) return;
      document.getElementById('env-node').textContent    = d.node_name    || '—';
      document.getElementById('env-cluster').textContent = d.cluster_name || '—';
      document.getElementById('env-region').textContent  = d.aws_region   || '—';
      document.getElementById('env-pod').textContent     = d.pod_name     || '—';
    }).catch(() => {});
  </script>
</body>
</html>
